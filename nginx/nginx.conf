events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    server_tokens off;  # Do not expose nginx version

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # =================================================================
    # HTTP → HTTPS redirect + Let's Encrypt challenge
    # =================================================================
    server {
        listen 80;
        server_name kupitstul.ru www.kupitstul.ru;

        # Certbot webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =================================================================
    # HTTPS — main site
    # =================================================================
    server {
        listen 443 ssl;
        http2  on;
        server_name kupitstul.ru www.kupitstul.ru;

        # SSL certs (mounted from nginx/ssl/)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security       "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options          nosniff                                        always;
        add_header Referrer-Policy                 strict-origin-when-cross-origin                always;
        add_header X-Permitted-Cross-Domain-Policies "none"                                      always;
        # Note: X-Frame-Options omitted — frame-ancestors in CSP takes precedence

        # ------------------------------------------------------------------
        # Next.js static assets — cache 1 year
        # ------------------------------------------------------------------
        location /_next/static/ {
            proxy_pass  http://app:3000;
            proxy_set_header Host $host;
            expires     1y;
            add_header  Cache-Control "public, max-age=31536000, immutable";
            access_log  off;
        }

        location /uploads/ {
            proxy_pass  http://app:3000;
            proxy_set_header Host $host;
            expires     7d;
            add_header  Cache-Control "public, max-age=604800";
            access_log  off;
        }

        # ------------------------------------------------------------------
        # API — rate-limited
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Next.js app — все остальные маршруты
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
