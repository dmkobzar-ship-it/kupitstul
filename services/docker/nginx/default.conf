server {
    listen 80;
    server_name kupitstul.ru www.kupitstul.ru;

    # ─── Security Headers ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ─── Next.js (main site) ─────────────────────
    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── PHP Order API ───────────────────────────
    location /api/order {
        fastcgi_pass php-fpm:9000;
        fastcgi_index order.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/order.php;
        include fastcgi_params;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

        # Rate limiting
        limit_req zone=order burst=3 nodelay;
    }

    location /api/csrf-token {
        fastcgi_pass php-fpm:9000;
        fastcgi_index csrf.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/csrf.php;
        include fastcgi_params;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }

    # ─── Chat WebSocket ──────────────────────────
    location /ws/chat {
        proxy_pass http://chat-server:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Chat API ────────────────────────────────
    location /api/chat/ {
        proxy_pass http://chat-server:3002/api/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Chat Widget Static ─────────────────────
    location /chat-widget.js {
        alias /var/www/frontend/chat-widget.js;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Content-Type "application/javascript; charset=utf-8";
    }

    # ─── Health check ────────────────────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ─── Static files ────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot|css|js)$ {
        proxy_pass http://nextjs:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ─── Rate limit zone ──────────────────────────
# (must be in http block - add to nginx.conf or include)
# limit_req_zone $binary_remote_addr zone=order:10m rate=2r/s;
