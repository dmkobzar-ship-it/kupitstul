# KupitStul.ru - CI/CD Pipeline
# Auto-deploy to production on every push to main

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ==============================
  # Deploy to Production (push only)
  # ==============================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /home/deploy/kupitstul
            git checkout -- Dockerfile docker-compose.yml nginx/ prisma/schema.prisma package.json package-lock.json 2>/dev/null || true
            git pull origin main
            docker-compose down --remove-orphans 2>/dev/null || true
            docker-compose up -d --build --no-cache
            sleep 40
            CONTAINER=$(docker ps --format '{{.Names}}' | grep 'app' | head -1)
            docker exec "$CONTAINER" ./node_modules/.bin/prisma db push --schema=./prisma/schema.prisma --accept-data-loss
            echo "Deployed successfully at $(date)"
