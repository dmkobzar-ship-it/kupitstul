# KupitStul.ru — Production Docker Compose
# Запуск: docker compose -f docker-compose.prod.yml up -d
#
# ПЕРЕД ПЕРВЫМ ЗАПУСКОМ выполни:
#   bash init-letsencrypt.sh

services:

  # ── Next.js App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://kupitstul.ru
      NEXT_PUBLIC_CHAT_WS_URL: wss://kupitstul.ru/ws/chat
    env_file:
      - .env.local
    volumes:
      # Данные (JSON-база, загрузки) — persistency
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - kupitstul-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Chat WebSocket Server ───────────────────────────────────────
  chat-server:
    build:
      context: ./services/chat-server
      dockerfile: Dockerfile
    expose:
      - "3002"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - kupitstul-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MySQL (chat history) ────────────────────────────────────────
  mysql:
    image: mysql:8.0-alpine
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env.local}
      MYSQL_DATABASE: ${DB_NAME:-kupitstul}
      MYSQL_USER: ${DB_USER:-kupitstul}
      MYSQL_PASSWORD: ${DB_PASS:?Set DB_PASS in .env.local}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - kupitstul-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx — Reverse Proxy + SSL ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app
      - chat-server
    restart: unless-stopped
    networks:
      - kupitstul-net
    # Auto-reload nginx each 6h (picks up renewed certs)
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ── Certbot — Let's Encrypt auto-renewal ───────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot:rw
      - certbot_conf:/etc/letsencrypt:rw
    restart: unless-stopped
    # Renew every 12 hours (cert expires in 90 days, renewed at 30 days left)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --quiet;
                    sleep 12h & wait $${!};
                  done"

volumes:
  mysql_data:
  certbot_www:
  certbot_conf:

networks:
  kupitstul-net:
    driver: bridge
