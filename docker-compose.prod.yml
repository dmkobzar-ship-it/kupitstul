# KupitStul.ru — Production Docker Compose
# Запуск: docker compose -f docker-compose.prod.yml up -d
#
# ПЕРЕД ПЕРВЫМ ЗАПУСКОМ выполни:
#   bash init-letsencrypt.sh

services:
  # ── Next.js App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://kupitstul.ru
    env_file:
      - .env.local
    volumes:
      # Данные (JSON-база, загрузки) — persistency
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - kupitstul-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx — Reverse Proxy + SSL ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app

    restart: unless-stopped
    networks:
      - kupitstul-net
    # Auto-reload nginx each 6h (picks up renewed certs)
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ── Certbot — Let's Encrypt auto-renewal ───────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot:rw
      - certbot_conf:/etc/letsencrypt:rw
    restart: unless-stopped
    # Renew every 12 hours (cert expires in 90 days, renewed at 30 days left)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --quiet;
                    sleep 12h & wait $${!};
                  done"

volumes:
  certbot_www:
  certbot_conf:

networks:
  kupitstul-net:
    driver: bridge
